# Cấu hình cổng chạy ứng dụng
server.port=8080

# Cấu hình kết nối cơ sở dữ liệu MySQL của XAMPP (Mật khẩu để trống)
spring.datasource.url=jdbc:mysql://localhost:3306/smartfee_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Cấu hình JPA / Hibernate tự động tạo bảng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# jwt settings
jwt.secret=0DMjSf5IVIRo4UwCbVDT75RS4hRE0xXfULif093u2iEkKfZc85KLv2vI+aNLi6leOpx/lkPt0G/SAGFQYSboig==
jwt.expiration=86400000

# Webhook secret for payment gateway
payment.webhook.secret=

# Logging
logging.level.org.springframework=INFO
logging.level.com.smartfee=DEBUG